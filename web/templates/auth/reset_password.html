<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — TAKNET-PS</title>
    <style>
        :root {
            --bg-primary: #0f1923;
            --bg-card: #1e2d3d;
            --bg-input: #162029;
            --border: #2a3a4a;
            --text-primary: #e8edf2;
            --text-secondary: #8899aa;
            --text-muted: #5a6a7a;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --green: #22c55e;
            --red: #ef4444;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
        }
        .card-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .08em;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .btn {
            width: 100%;
            margin-top: 8px;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        .btn:hover { background: var(--accent-hover); }
        .msg-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--red);
            margin-bottom: 16px;
        }
        .msg-success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 6px;
            padding: 14px;
            font-size: 13px;
            color: var(--green);
            text-align: center;
        }
        .back-link {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .back-link a { color: var(--accent); text-decoration: none; }
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-label">Reset Password</div>

    {% if success %}
        <div class="msg-success">
            ✓ Your password has been reset.<br>
            You can now <a href="/login" style="color:var(--accent);">sign in</a>.
        </div>
    {% else %}
        {% if error %}
            <div class="msg-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" autocomplete="new-password" required minlength="6" autofocus>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" autocomplete="new-password" required minlength="6">
            </div>
            <button class="btn" type="submit">Update Password</button>
        </form>
    {% endif %}

    <div class="back-link">
        <a href="/login">← Back to Login</a>
    </div>
</div>

<div class="footer-note">TAKNET-PS v{{ version }}</div>
</body>
</html>
