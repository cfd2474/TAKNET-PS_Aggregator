upstream dashboard {
    server dashboard:5000;
}

upstream tar1090_upstream {
    server tar1090:80;
}

upstream aircraft_merger {
    server aircraft-merger:8090;
}

upstream taknet_api {
    server api:8880;
    keepalive 4;
}

server {
    listen 80;
    server_name adsb.tak-solutions.com _;

    # Docker embedded DNS — required for proxy_pass with IP variables
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Dashboard (Flask) — default handler
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SSE stream endpoint — disable buffering for live log streaming
    location /api/updates/stream {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ADS-B REST API (v2) — public, no auth required
    location /v2/ {
        proxy_pass http://taknet_api/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        add_header Access-Control-Allow-Origin *;
    }

    # tar1090 map
    location /tar1090/ {
        proxy_pass http://tar1090_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Merged aircraft (local + ADSBHub when enabled); prefer local per ICAO
    location = /data/aircraft.json {
        proxy_pass http://aircraft_merger/data/aircraft.json;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }
    # Other tar1090 data (traces etc)
    location /data/ {
        proxy_pass http://tar1090_upstream/data/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # graphs1090
    location /graphs1090/ {
        proxy_pass http://tar1090_upstream/graphs1090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Feeder direct proxy — routes through aggregator's NetBird connection.
    # nginx handles WebSockets natively; Flask validates session via auth_request.
    location ~ "^/feeder-view/([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+):([0-9]+)(/.*)?$" {
        auth_request     /api/feeder-view-auth;
        auth_request_set $auth_status $upstream_status;

        set $feeder_ip   $1;
        set $feeder_port $2;
        set $feeder_path $3;

        if ($feeder_path = '') {
            set $feeder_path /;
        }

        # WebSocket upgrade support
        set $conn_upgrade "";
        if ($http_upgrade != "") {
            set $conn_upgrade upgrade;
        }

        proxy_pass         http://$feeder_ip:$feeder_port$feeder_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $conn_upgrade;
        proxy_set_header   Host       $feeder_ip:$feeder_port;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Auth sub-request for feeder proxy
    location = /api/feeder-view-auth {
        internal;
        proxy_pass              http://dashboard/api/feeder-view-auth;
        proxy_set_header        Host           $host;
        proxy_set_header        Cookie         $http_cookie;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 443 ssl;
    server_name adsb.tak-solutions.com;

    ssl_certificate     /etc/letsencrypt/live/netbird.tak-solutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netbird.tak-solutions.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /api/updates/stream {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ADS-B REST API (v2) — public, no auth required
    location /v2/ {
        proxy_pass http://taknet_api/v2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        add_header Access-Control-Allow-Origin *;
    }

    location /tar1090/ {
        proxy_pass http://tar1090_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /data/aircraft.json {
        proxy_pass http://aircraft_merger/data/aircraft.json;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }
    location /data/ {
        proxy_pass http://tar1090_upstream/data/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /graphs1090/ {
        proxy_pass http://tar1090_upstream/graphs1090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ "^/feeder-view/([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+):([0-9]+)(.*)?$" {
        auth_request     /api/feeder-view-auth;
        auth_request_set $auth_status $upstream_status;
        set $feeder_ip   $1;
        set $feeder_port $2;
        set $feeder_path $3;
        if ($feeder_path = '') { set $feeder_path /; }
        set $conn_upgrade "";
        if ($http_upgrade != "") { set $conn_upgrade upgrade; }
        proxy_pass         http://$feeder_ip:$feeder_port$feeder_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $conn_upgrade;
        proxy_set_header   Host       $feeder_ip:$feeder_port;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    location = /api/feeder-view-auth {
        internal;
        proxy_pass              http://dashboard/api/feeder-view-auth;
        proxy_set_header        Host           $host;
        proxy_set_header        Cookie         $http_cookie;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
    }

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
